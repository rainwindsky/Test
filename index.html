<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>向上吧！马里奥 - 竖屏H5挑战</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
        }

        .retro-font {
            font-family: 'Press Start 2P', cursive;
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
            background-color: #5c94fc;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
            transition: background-color 1s ease;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .overlay-screen {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            backdrop-filter: blur(8px);
            z-index: 50;
            transition: opacity 0.3s;
        }

        .hidden { 
            display: none !important; 
        }

        .hud {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            color: white;
            text-shadow: 3px 3px 0px #000;
            z-index: 10;
        }

        .score-display { 
            font-family: 'Press Start 2P', cursive;
            font-size: 24px; 
            text-align: center; 
            width: 100%; 
            margin-top: 15px;
        }

        .touch-zone-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            display: flex;
            pointer-events: none;
            opacity: 0.3;
            z-index: 5;
        }

        .touch-zone {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 30px;
        }

        .hint-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .game-title {
            font-family: 'Press Start 2P', cursive;
            text-shadow: 0 6px 0 #d92525, 0 10px 10px rgba(0,0,0,0.5);
            line-height: 1.5;
        }

        .floating-icon {
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .retro-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: white;
            padding: 20px 30px;
            border: 4px solid white;
            border-radius: 10px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.1s;
        }

        .retro-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="app-container">
    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer" id="hud-layer">
        <div class="hud">
            <div class="score-display"><span id="current-score">0</span><span class="text-lg">m</span></div>
        </div>
        <div class="touch-zone-container" id="touch-hints">
            <div class="touch-zone border-r border-white/30"><span class="hint-text">&lt; TAP</span></div>
            <div class="touch-zone border-l border-white/30"><span class="hint-text">TAP &gt;</span></div>
        </div>
    </div>

    <div id="start-screen" class="overlay-screen">
        <div class="floating-icon text-6xl mb-6">🍄</div>
        <h1 class="game-title text-4xl mb-4 text-white text-center">UP MARIO</h1>
        <p class="text-gray-200 mb-10 text-center px-6 text-sm leading-relaxed">按住屏幕左右两侧移动<br>挑战极限高度</p>

        <button id="start-btn" class="retro-btn bg-gradient-to-b from-[#ff5e5e] to-[#d92525]">
            START GAME
        </button>
    </div>

    <div id="game-over-screen" class="overlay-screen hidden">
        <h2 class="text-2xl font-black mb-2 text-red-400 retro-font">GAME OVER</h2>
        <div class="text-white text-sm mb-6 text-center">
            SCORE<br>
            <span id="final-score" class="text-4xl text-yellow-400 drop-shadow-md retro-font mt-2 inline-block">0</span>
        </div>

        <div class="leaderboard-card w-full max-w-[300px] bg-black/70 rounded-xl p-5 mb-8 border border-white/20 shadow-2xl backdrop-blur-sm">
            <h3 class="text-center text-[10px] text-gray-400 mb-4 retro-font">WORLD RANKING</h3>
            <ul id="leaderboard-list" class="space-y-3 font-sans">
                <li class="flex justify-center text-xs text-gray-300 animate-pulse">Connecting...</li>
            </ul>
        </div>

        <button id="restart-btn" class="retro-btn bg-gradient-to-b from-[#4facfe] to-[#00f2fe]">
            PLAY AGAIN
        </button>
    </div>
</div>

<script>
// --- 数据库安全初始化 ---
let useFirebase = false;
let auth = null;
let db = null;
let appId = 'vertical-mario-1';

try {
    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
        appId = typeof __app_id !== 'undefined' ? __app_id : 'vertical-mario-1';
        useFirebase = true;
    }
} catch (e) {
    console.warn("Firebase 离线模式启用");
}

// --- 基础配置 ---
const container = document.getElementById('app-container');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height;

const resize = () => {
    width = container.clientWidth;
    height = container.clientHeight;
    canvas.width = width;
    canvas.height = height;
};
resize();
window.addEventListener('resize', resize);

let gameState = 'START';
let user = null;
let score = 0, maxScore = 0, cameraY = 0;
const GRAVITY = 0.45;
const JUMP_VELOCITY = -11.5;
const MOVE_SPEED = 6.5;
const input = { left: false, right: false };
const ASSETS = { player: '🏃', platform: '🟩', cloud: '☁️', spring: '🍄' };

// --- 核心类定义 ---
class Player {
    constructor() { 
        this.reset();
    }
    reset() {
        this.size = 40;
        this.x = width / 2 - this.size / 2;
        this.y = height - 150;
        this.vx = 0; this.vy = 0;
        this.facingLeft = false;
    }
    update() {
        if (input.left) { 
            this.x -= MOVE_SPEED;
            this.facingLeft = true; 
        }
        else if (input.right) { 
            this.x += MOVE_SPEED;
            this.facingLeft = false; 
        }
        if (this.x < -this.size) this.x = width;
        if (this.x > width) this.x = -this.size;
        this.vy += GRAVITY;
        this.y += this.vy;
    }
    jump(multiplier = 1) { 
        this.vy = JUMP_VELOCITY * multiplier;
    }
    draw() {
        ctx.save();
        ctx.font = `${this.size}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        const drawY = this.y - cameraY;
        if (this.facingLeft) {
            ctx.translate(this.x + this.size/2, drawY + this.size);
            ctx.scale(-1, 1);
            ctx.fillText(ASSETS.player, 0, 0);
        } else {
            ctx.fillText(ASSETS.player, this.x + this.size/2, drawY + this.size);
        }
        ctx.restore();
    }
}

class Platform {
    constructor(x, y, type = 'normal') {
        this.x = x;
        this.y = y; this.w = 75; this.h = 18; this.type = type;
        this.movingRight = Math.random() > 0.5;
        this.speed = 1 + Math.random() * 2.5;
    }
    update() {
        if (this.type === 'moving') {
            if (this.movingRight) {
                this.x += this.speed;
                if (this.x + this.w > width) this.movingRight = false;
            } else {
                this.x -= this.speed;
                if (this.x < 0) this.movingRight = true;
            }
        }
    }
    draw() {
        const dY = this.y - cameraY;
        if (dY > height + 50 || dY < -50) return;
        ctx.save();
        if (this.type === 'spring') {
            ctx.fillStyle = '#C04000';
            ctx.fillRect(this.x, dY, this.w, this.h);
            ctx.font = '24px Arial'; ctx.fillText(ASSETS.spring, this.x + 25, dY - 5);
        } else if (this.type === 'moving') {
            ctx.font = '28px Arial';
            ctx.fillText(ASSETS.cloud, this.x, dY + 5); ctx.fillText(ASSETS.cloud, this.x + 35, dY + 5);
        } else {
            ctx.fillStyle = '#8bc34a'; ctx.beginPath();
            ctx.roundRect(this.x, dY, this.w, this.h, 8); ctx.fill();
            ctx.strokeStyle = '#558b2f'; ctx.lineWidth = 3; ctx.stroke();
        }
        ctx.restore();
    }
}

// --- 游戏逻辑管理 ---
let player = new Player();
let platforms = [];
let basePlatformY = 0;

const initGame = () => {
    player.reset();
    platforms = [new Platform(width / 2 - 35, height - 50, 'normal')];
    cameraY = 0; score = 0;
    maxScore = 0;
    basePlatformY = height - 50;
    for (let i = 0; i < 15; i++) generatePlatform();
    document.getElementById('touch-hints').style.opacity = '0.3';
    setTimeout(() => { document.getElementById('touch-hints').style.opacity = '0'; }, 3000);
};

const generatePlatform = () => {
    basePlatformY -= (55 + Math.random() * 65);
    let type = 'normal';
    const r = Math.random();
    if (score > 100 && r < 0.25) type = 'moving';
    else if (r < 0.25) type = 'spring';
    platforms.push(new Platform(Math.random() * (width - 75), basePlatformY, type));
};

const update = () => {
    if (gameState !== 'PLAYING') return;
    player.update();
    if (player.vy > 0) {
        platforms.forEach(p => {
            if (player.y + player.size >= p.y && player.y + player.size <= p.y + p.h + player.vy + 2 &&
                player.x + player.size > p.x - 10 && player.x < p.x + p.w + 10) {
                player.y = p.y - player.size;
                player.jump(p.type === 'spring' ? 1.6 : 1);
            }
        });
    }
    platforms.forEach(p => p.update());
    if (player.y < cameraY + height / 2) {
        cameraY -= ((cameraY + height / 2) - player.y);
        const h = Math.floor(Math.abs(cameraY) / 10);
        if (h > maxScore) {
            maxScore = h;
            score = h;
            document.getElementById('current-score').innerText = score;
            const bg = h < 100 ?
                '#5c94fc' : (h < 300 ? '#2c3e50' : '#0f0c29');
            container.style.backgroundColor = bg;
        }
    }
    platforms = platforms.filter(p => p.y < cameraY + height + 50);
    while (basePlatformY > cameraY - height) generatePlatform();
    if (player.y > cameraY + height) endGame();
};

const draw = () => {
    ctx.clearRect(0, 0, width, height);
    if (gameState === 'PLAYING') {
        platforms.forEach(p => p.draw());
        player.draw();
    }
    requestAnimationFrame(() => { update(); draw(); });
};

const endGame = async () => {
    gameState = 'GAMEOVER';
    document.getElementById('final-score').innerText = score;
    document.getElementById('game-over-screen').classList.remove('hidden');
    
    if (useFirebase && user) {
        const ref = db.doc(`artifacts/${appId}/public/data/leaderboard/${user.uid}`);
        const snap = await ref.get();
        if (!snap.exists || snap.data().score < score) {
            await ref.set({ userId: user.uid, score, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }
        loadLeaderboard();
    }
};

const loadLeaderboard = async () => {
    if (!useFirebase) return;
    const list = document.getElementById('leaderboard-list');
    try {
        const snap = await db.collection(`artifacts/${appId}/public/data/leaderboard`).get();
        const data = snap.docs.map(d => d.data()).sort((a, b) => b.score - a.score).slice(0, 5);
        const medals = ['🥇', '🥈', '🥉', '🏅', '🏅'];
        list.innerHTML = data.map((it, i) => `
            <li class="flex justify-between items-center py-1 ${it.userId === user?.uid ? 'text-yellow-400 font-bold' : 'text-white'}">
                <span>${medals[i]} ${it.userId.substring(0,5)}</span>
                <span>${it.score}m</span>
            </li>`).join('');
    } catch(e) { list.innerHTML = "Rankings Unavailable"; }
};

// --- 事件监听绑定 ---
const bindEvents = () => {
    const start = () => {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        gameState = 'PLAYING';
        initGame();
    };
    
    document.getElementById('start-btn').onclick = (e) => { e.stopPropagation(); start(); };
    document.getElementById('restart-btn').onclick = (e) => { e.stopPropagation(); start(); };

    const handleDown = (x) => { 
        if(gameState === 'PLAYING') { 
            input.left = x < width/2;
            input.right = x >= width/2; 
        }
    };
    
    const handleUp = () => { input.left = false; input.right = false; };
    
    container.addEventListener('touchstart', (e) => {
        if(e.target.tagName !== 'BUTTON') {
            e.preventDefault();
            handleDown(e.touches[0].clientX);
        }
    }, {passive: false});
    
    container.addEventListener('touchend', (e) => {
        if(e.target.tagName !== 'BUTTON') {
            e.preventDefault();
        }
        handleUp();
    }, {passive: false});
    
    container.addEventListener('mousedown', (e) => {
        if(e.target.tagName !== 'BUTTON') {
            handleDown(e.clientX);
        }
    });
    
    window.addEventListener('mouseup', handleUp);
    
    window.addEventListener('keydown', (e) => { 
        if(e.code==='ArrowLeft') input.left=true; 
        if(e.code==='ArrowRight') input.right=true; 
    });
    
    window.addEventListener('keyup', (e) => { 
        if(e.code==='ArrowLeft') input.left=false; 
        if(e.code==='ArrowRight') input.right=false; 
    });
};

// --- 启动项 ---
document.addEventListener('DOMContentLoaded', async () => {
    bindEvents();
    draw();
    if (useFirebase) {
        try {
            const res = await auth.signInAnonymously();
            user = res.user;
        } catch(e) {}
    }
});
</script>
</body>
</html>
