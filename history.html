    <div id="bgm-btn" class="bgm-btn">🎵</div>

    <div class="content-container">
        <h2>千年流芳</h2>
        <p class="history-intro">自明万历至今，虞山琴派历经四百余年，代代相传，被尊为“古音正宗”。</p>

        <div class="timeline">
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <h3>奠基创立 · 明万历</h3>
                    <p><strong>严天池</strong>创立“琴川琴社”，主张“重音轻辞”，编纂《松弦馆琴谱》（唯一入选《四库全书》的明代琴谱），奠定“清微淡远”之基调。</p>
                </div>
            </div>

            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <h3>完善鼎盛 · 明末清初</h3>
                    <p><strong>徐上瀛</strong>集大成，编纂《大还阁琴谱》，著《溪山琴况》提出古琴审美“二十四况”，构建了中国古琴史上最完整的美学体系。</p>
                </div>
            </div>

            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <h3>近现代复兴 · 至今</h3>
                    <p>一代宗师<strong>吴景略</strong>创立“虞山吴派”，让虞山琴韵重焕生机。2008年，古琴艺术（虞山琴派）正式列入国家级非物质文化遗产名录。</p>
                </div>
            </div>
        </div>
    </div>
</div>
